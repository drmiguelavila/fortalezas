const THEME_KEYS_ORDERED = Object.keys(THEMES);

/* Codifica el Top 5 (índices de THEME_KEYS_ORDERED) en un string corto para compartir por URL */
function encodeResultToHash(top5Keys) {
  const indices = top5Keys.map((k) => THEME_KEYS_ORDERED.indexOf(k));
  return indices.map((i) => i.toString(36)).join("-");
}

function decodeHashToThemes(hash) {
  try {
    const indices = hash.split("-").map((s) => parseInt(s, 36));
    const keys = indices.map((i) => THEME_KEYS_ORDERED[i]).filter(Boolean);
    if (keys.length === 0) return null;
    return keys.map((key) => ({ key, score: null, ...THEMES[key] }));
  } catch (e) {
    return null;
  }
}

/* ============================================================
   SCORING
   Cada elección suma 1 punto al tema elegido.
   Resultado: ranking de 34 temas, Top 5, y distribución por dominio.
   ============================================================ */
function computeResults(answers) {
  const scores = {};
  Object.keys(THEMES).forEach((k) => (scores[k] = 0));
  answers.forEach((choice) => {
    if (choice) scores[choice] = (scores[choice] || 0) + 1;
  });
  const ranked = Object.entries(scores)
    .map(([key, score]) => ({ key, score, ...THEMES[key] }))
    .sort((a, b) => b.score - a.score);

  const domainTotals = { ejecucion: 0, influencia: 0, relaciones: 0, estrategico: 0 };
  ranked.forEach((t) => (domainTotals[t.domain] += t.score));
  const domainMax = { ejecucion: 0, influencia: 0, relaciones: 0, estrategico: 0 };
  Object.values(THEMES).forEach((t) => {});
  // max possible per theme appearances is variable; normalize by count of appearances
  const appearanceCount = {};
  Object.keys(THEMES).forEach((k) => (appearanceCount[k] = 0));
  PAIRS.forEach(([a, b]) => {
    appearanceCount[a] += 1;
    appearanceCount[b] += 1;
  });

  return { ranked, domainTotals, appearanceCount };
}

function ProgressBar({ current, total }) {
  const pct = Math.round((current / total) * 100);
  return (
    <div style={{ width: "100%", marginBottom: 32 }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
        <span style={{ fontSize: 12, color: "#8a8a8a", letterSpacing: "0.05em", textTransform: "uppercase" }}>
          Pregunta {current} de {total}
        </span>
        <span style={{ fontSize: 12, color: PURPLE, fontWeight: 500 }}>{pct}%</span>
      </div>
      <div style={{ width: "100%", height: 3, background: "#1a1a1a", borderRadius: 4, overflow: "hidden" }}>
        <div
          style={{
            width: `${pct}%`,
            height: "100%",
            background: PURPLE,
            transition: "width 0.4s ease",
          }}
        />
      </div>
    </div>
  );
}

  return (
    <div style={{ maxWidth: 640, margin: "0 auto", textAlign: "center", padding: "240px 20px 60px" }}>
      <p style={{ fontSize: 11, fontWeight: 500, textTransform: "uppercase", letterSpacing: "0.12em", color: PURPLE, marginBottom: 16 }}>
        Talentos Naturales · 34 Temas
      </p>
      <h1 style={{ fontSize: 32, fontWeight: 500, color: "#fff", marginBottom: 20, lineHeight: 1.3 }}>
        Descubre tus 5 talentos dominantes
      </h1>
      <p style={{ fontSize: 16, lineHeight: 1.8, color: "#aaa", marginBottom: 36 }}>
        68 pares de elección forzada, inspirados en la metodología de evaluación de talentos
        de Gallup. Sin término medio: elige instintivamente la afirmación que más se parece a ti.
        No hay respuestas correctas — solo patrones naturales de pensar, sentir y actuar.
      </p>
      <div style={{ display: "flex", gap: 16, justifyContent: "center", marginBottom: 40, flexWrap: "wrap" }}>
        {[
          ["68", "preguntas"],
          ["34", "temas evaluados"],
          ["~15", "minutos"],
        ].map(([num, label]) => (
          <div key={label} style={{ background: "#0D0514", border: "1px solid #2a1638", borderRadius: 10, padding: "14px 22px" }}>
            <div style={{ fontSize: 22, fontWeight: 300, color: "#fff" }}>{num}</div>
            <div style={{ fontSize: 11, color: "#9B7FBF", textTransform: "uppercase", letterSpacing: "0.05em" }}>{label}</div>
          </div>
        ))}
      </div>
      <button
        onClick={onStart}
        style={{
          background: PURPLE,
          color: "#fff",
          border: "none",
          padding: "14px 36px",
          borderRadius: 10,
          fontSize: 15,
          fontWeight: 500,
          cursor: "pointer",
        }}
      >
        Comenzar evaluación →
      </button>
    </div>
  );
}

function QuestionScreen({ pairIndex, onChoose }) {
  const [a, b, textA, textB] = PAIRS[pairIndex];
  return (
    <div style={{ maxWidth: 720, margin: "0 auto", padding: "240px 20px 40px" }}>
      <ProgressBar current={pairIndex + 1} total={PAIRS.length} />
      <p style={{ textAlign: "center", fontSize: 13, color: "#666", marginBottom: 28, textTransform: "uppercase", letterSpacing: "0.05em" }}>
        ¿Cuál se parece más a ti?
      </p>
      <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
        <ChoiceCard text={textA} onClick={() => onChoose(a)} side="a" />
        <ChoiceCard text={textB} onClick={() => onChoose(b)} side="b" />
      </div>
    </div>
  );
}

function DomainBar({ domain, total, max }) {
  const d = DOMAINS[domain];
  const pct = max > 0 ? Math.round((total / max) * 100) : 0;
  return (
    <div style={{ marginBottom: 16 }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
        <span style={{ fontSize: 13, fontWeight: 500, color: "#fff" }}>{d.label}</span>
        <span style={{ fontSize: 12, color: "#888" }}>{total} pts</span>
      </div>
      <div style={{ width: "100%", height: 8, background: "#1a1a1a", borderRadius: 6, overflow: "hidden" }}>
        <div style={{ width: `${pct}%`, height: "100%", background: d.color, borderRadius: 6 }} />
      </div>
      <p style={{ fontSize: 11, color: "#666", marginTop: 4 }}>{d.tagline}</p>
    </div>
  );
}

  const margin = 56;

    const footerY = pageHeight - 40;
    doc.setDrawColor(220, 220, 220);

    doc.setTextColor(...PURPLE_RGB);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(9.5);
    doc.text("drmiguelavila.com", margin, footerY);

    doc.setFont("helvetica", "normal");
    doc.setFontSize(8);
    doc.text("Basado en la investigación de Don Clifton & Gallup · Resultado orientativo, no oficial", margin, footerY + 12);
  }

    const developLines = doc.splitTextToSize(theme.develop, contentWidth - 14);

    const basementH = 20 + basementLines.length * 11;
    const developH = 20 + developLines.length * 11;

    doc.setFillColor(247, 245, 250);
    doc.setDrawColor(...PURPLE_RGB);
    doc.setLineWidth(0.6);
    doc.roundedRect(margin, boxTop, pageWidth - margin * 2, totalBoxHeight, 6, 6, "FD");

    let innerY = boxTop + 18;

    doc.setTextColor(...PURPLE_RGB);
    doc.setFont("helvetica", "normal");
    doc.setFontSize(18);
    doc.text(String(i + 1), margin + 14, innerY);

    doc.setTextColor(20, 20, 20);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(13.5);
    doc.text(theme.name, margin + 42, innerY - 4);

    doc.setTextColor(...PURPLE_RGB);
    doc.setFont("helvetica", "normal");
    doc.setFontSize(8);
    doc.text(DOMAINS[theme.domain].label.toUpperCase(), margin + 42, innerY + 8);

    innerY += 18;
    doc.setTextColor(...GRAY);
    doc.setFont("helvetica", "normal");
    doc.setFontSize(9.3);
    doc.text(descLines, margin + 42, innerY);
    innerY += descLines.length * 12 + 10;

    // Sótano

    doc.setFillColor(252, 235, 233);
    doc.roundedRect(margin + 14, innerY - 12, pageWidth - margin * 2 - 28, basementBoxH, 4, 4, "F");
    doc.setTextColor(...RED_RGB);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(8.3);
    doc.text("SÓTANO — RIESGO DE SOBREUSO", margin + 22, innerY);
    doc.setTextColor(120, 50, 45);
    doc.setFont("helvetica", "normal");
    doc.setFontSize(9);
    doc.text(basementLines, margin + 22, innerY + 12);
    innerY += basementBoxH + 8;

    // Desarrollo
    const developBoxH = developLines.length * 11 + 18;
    doc.setFillColor(228, 245, 238);
    doc.roundedRect(margin + 14, innerY - 12, pageWidth - margin * 2 - 28, developBoxH, 4, 4, "F");
    doc.setTextColor(...GREEN_RGB);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(8.3);
    doc.text("CÓMO FORTALECERLO", margin + 22, innerY);
    doc.setTextColor(30, 90, 65);
    doc.setFont("helvetica", "normal");
    doc.setFontSize(9);
    doc.text(developLines, margin + 22, innerY + 12);

    y = boxTop + totalBoxHeight + 16;
  });

  // Distribución por dominio
  y = ensureSpace(180, y);
  y += 6;
  doc.setTextColor(...PURPLE_RGB);
  doc.setFont("helvetica", "bold");
  doc.setFontSize(13);
  doc.text("Distribución por dominio", margin, y);
  y += 22;

  Object.entries(domainTotals).forEach(([domain, total]) => {
    const d = DOMAINS[domain];
    doc.setTextColor(20, 20, 20);
    doc.setFont("helvetica", "normal");
    doc.setFontSize(9.5);
    doc.text(d.label, margin, y + 10);
    doc.setTextColor(...GRAY);
    doc.text(`${total} pts`, pageWidth - margin - 30, y + 10);
    doc.setFillColor(230, 225, 238);
    doc.roundedRect(margin, y + 14, pageWidth - margin * 2, 6, 3, 3, "F");
    const maxTotal = Math.max(...Object.values(domainTotals), 1);
    const w = ((pageWidth - margin * 2) * total) / maxTotal;
    doc.setFillColor(...PURPLE_RGB);
    if (w > 0) doc.roundedRect(margin, y + 14, w, 6, 3, 3, "F");
    y += 32;
  });

  drawFooter();
  doc.save("talentos-dominantes.pdf");
}

function ShareLinkBox({ top5 }) {
  const [copied, setCopied] = useState(false);
  const hash = encodeResultToHash(top5.map((t) => t.key));
  const baseUrl = window.location.origin + window.location.pathname;
  const shareUrl = `${baseUrl}#r=${hash}`;

  function handleCopy() {
    const input = document.getElementById("share-link-input");
    input.select();
    input.setSelectionRange(0, 99999);
    navigator.clipboard.writeText(shareUrl).catch(() => {
      document.execCommand("copy");
    });
    setCopied(true);
    setTimeout(() => setCopied(false), 1800);
  }

  return (
    <div style={{ marginBottom: 36 }}>
      <p style={{ fontSize: 13, fontWeight: 500, color: "#9B7FBF", marginBottom: 8 }}>
        Enlace para compartir tu resultado
      </p>
      <div
        style={{
          display: "flex",
          alignItems: "center",
          gap: 8,
          background: "#0D0514",
          border: `1px solid ${PURPLE}`,
          borderRadius: 8,
          padding: "10px 14px",
        }}
      >
        <input
          id="share-link-input"
          type="text"
          readOnly
          value={shareUrl}
          style={{
            flex: 1,
            background: "transparent",
            border: "none",
            color: "#c9a8f0",
            fontSize: 13,
            outline: "none",
            fontFamily: "monospace",
          }}
        />
        <button
          onClick={handleCopy}
          style={{
            background: PURPLE,
            color: "#fff",
            border: "none",
            padding: "6px 14px",
            borderRadius: 6,
            fontSize: 12,
            fontWeight: 500,
            cursor: "pointer",
            whiteSpace: "nowrap",
          }}
        >
          {copied ? "¡Copiado!" : "Copiar"}
        </button>
      </div>
    </div>
  );
}

function StrengthsAssessment() {
  const sharedThemes = useMemo(() => {
    const hashMatch = window.location.hash.match(/r=([a-z0-9-]+)/i);
    if (hashMatch) {
      return decodeHashToThemes(hashMatch[1]);
    }
    return null;
  }, []);

  const [stage, setStage] = useState(sharedThemes ? "shared" : "intro"); // intro | quiz | results | shared
  const [pairIndex, setPairIndex] = useState(0);
  const [answers, setAnswers] = useState([]);

  const results = useMemo(() => computeResults(answers), [answers]);

  function handleChoose(themeKey) {
    const next = [...answers, themeKey];
    setAnswers(next);
    if (pairIndex + 1 < PAIRS.length) {
      setPairIndex(pairIndex + 1);
    } else {
      setStage("results");
    }
  }

  const sharedResultsObject = sharedThemes
    ? { ranked: sharedThemes, domainTotals: { ejecucion: 0, influencia: 0, relaciones: 0, estrategico: 0 } }
    : null;

  return (
    <div style={{ minHeight: "100vh", background: "#000000", fontFamily: "-apple-system, BlinkMacSystemFont, 'Inter', sans-serif", position: "relative" }}>
      <Header />
      {stage === "intro" && <IntroScreen onStart={() => setStage("quiz")} />}
      {stage === "quiz" && <QuestionScreen pairIndex={pairIndex} onChoose={handleChoose} />}
      {stage === "results" && <ResultsScreen results={results} isSharedView={false} />}
      {stage === "shared" && <ResultsScreen results={sharedResultsObject} isSharedView={true} />}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(StrengthsAssessment));
