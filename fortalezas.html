/* ============================================================
   SCORING
   Cada elección suma 1 punto al tema elegido.
   Resultado: ranking de 34 temas, Top 5, y distribución por dominio.
   ============================================================ */
function computeResults(answers) {
  const scores = {};
  Object.keys(THEMES).forEach((k) => (scores[k] = 0));
  answers.forEach((choice) => {
    if (choice) scores[choice] = (scores[choice] || 0) + 1;
  });
  const ranked = Object.entries(scores)
    .map(([key, score]) => ({ key, score, ...THEMES[key] }))
    .sort((a, b) => b.score - a.score);

  const domainTotals = { ejecucion: 0, influencia: 0, relaciones: 0, estrategico: 0 };
  ranked.forEach((t) => (domainTotals[t.domain] += t.score));
  const domainMax = { ejecucion: 0, influencia: 0, relaciones: 0, estrategico: 0 };
  Object.values(THEMES).forEach((t) => {});
  // max possible per theme appearances is variable; normalize by count of appearances
  const appearanceCount = {};
  Object.keys(THEMES).forEach((k) => (appearanceCount[k] = 0));
  PAIRS.forEach(([a, b]) => {
    appearanceCount[a] += 1;
    appearanceCount[b] += 1;
  });

  return { ranked, domainTotals, appearanceCount };
}

                    textTransform: "uppercase",
                    letterSpacing: "0.05em",
                    border: `1px solid ${DOMAINS[theme.domain].color}55`,
                    borderRadius: 20,
                    padding: "2px 8px",
                  }}
                >
                  {DOMAINS[theme.domain].label}
                </span>
              </div>
              <p style={{ fontSize: 13.5, color: "#aaa", lineHeight: 1.6, margin: 0 }}>{theme.desc}</p>
            </div>
          </div>
        ))}
      </div>

      <h2 style={{ fontSize: 18, fontWeight: 500, color: "#fff", marginBottom: 6, borderBottom: "0.5px solid #2a2a2a", paddingBottom: 8 }}>
        Distribución por dominio
      </h2>
      <p style={{ fontSize: 13, color: "#888", marginBottom: 20 }}>
        Dónde se concentra tu forma natural de aportar valor
      </p>
      <div style={{ marginBottom: 40 }}>
        {Object.entries(domainTotals).map(([domain, total]) => (
          <DomainBar key={domain} domain={domain} total={total} max={maxDomainTotal} />
        ))}
      </div>

      <div
        style={{
          border: `1px solid ${PURPLE}`,
          borderRadius: 12,
          padding: "24px",
          textAlign: "center",
          background: "#0D0514",
          marginBottom: 20,
        }}
      >
        <h3 style={{ fontSize: 16, fontWeight: 500, color: "#fff", marginBottom: 8 }}>
          ¿Quieres profundizar en tu perfil completo?
        </h3>
        <p style={{ fontSize: 13.5, color: "#b0b0b0", marginBottom: 16 }}>
          Este resultado es una aproximación orientativa. Para el reporte oficial y certificado de los 34 temas, visita Gallup.com.
        </p>
        <button
          onClick={onRestart}
          style={{
            background: "transparent",
            border: `1px solid ${PURPLE}`,
            color: "#c9a8f0",
            padding: "10px 24px",
            borderRadius: 8,
            fontSize: 14,
            fontWeight: 500,
            cursor: "pointer",
          }}
        >
          Repetir evaluación
        </button>
      </div>
    </div>
  );
}

function StrengthsAssessment() {
  const [stage, setStage] = useState("intro"); // intro | quiz | results
  const [pairIndex, setPairIndex] = useState(0);
  const [answers, setAnswers] = useState([]);

  const results = useMemo(() => computeResults(answers), [answers]);

  function handleChoose(themeKey) {
    const next = [...answers, themeKey];
    setAnswers(next);
    if (pairIndex + 1 < PAIRS.length) {
      setPairIndex(pairIndex + 1);
    } else {
      setStage("results");
    }
  }

  function handleRestart() {
    setStage("intro");
    setPairIndex(0);
    setAnswers([]);
  }

  return (
    <div style={{ minHeight: "100vh", background: "#000000", fontFamily: "-apple-system, BlinkMacSystemFont, 'Inter', sans-serif" }}>
      {stage === "intro" && <IntroScreen onStart={() => setStage("quiz")} />}
      {stage === "quiz" && <QuestionScreen pairIndex={pairIndex} onChoose={handleChoose} />}
      {stage === "results" && <ResultsScreen results={results} onRestart={handleRestart} />}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<StrengthsAssessment />);
</script>
</body>
</html>
